name: Sync from Parent and Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

env:
  PARENT_REPO: 'https://github.com/cryptomator/android.git'
  LICENSE_CHECK_FILE: 'domain/src/main/java/org/cryptomator/domain/usecases/DoLicenseCheck.java'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync_and_release:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own pushes
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true
          git remote add parent ${{ env.PARENT_REPO }}

      - name: Sync develop branch
        run: |
          git checkout develop || git checkout -b develop origin/develop || echo "Skipping develop: not found"

          if [ "$(git branch --show-current)" = "develop" ]; then
            git fetch parent develop || { echo "Parent has no develop branch"; exit 0; }
            DEV_COMMITS=$(git rev-list HEAD..parent/develop --count 2>/dev/null || echo "0")
            if [ "$DEV_COMMITS" -gt 0 ]; then
              if git merge parent/develop -m "Sync develop with parent"; then
                git push origin develop
              else
                echo "Merge conflict on develop, aborting."
                git merge --abort
              fi
            else
              echo "Develop branch is up to date."
            fi
          fi

      - name: Sync main branch
        id: sync_main
        run: |
          git checkout main || git checkout -b main origin/main

          git fetch parent main

          NEW_COMMITS=$(git rev-list HEAD..parent/main --count)
          if [ "$NEW_COMMITS" -gt 0 ]; then
            echo "Changes found in parent main branch."
            git merge parent/main -m "Sync main with parent"
            git push origin main
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "Main branch is up to date."
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Replace Public Keys
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          CUSTOM_ANDROID_PUB_KEY: ${{ secrets.CUSTOM_ANDROID_PUB_KEY }}
          CUSTOM_DESKTOP_PUB_KEY: ${{ secrets.CUSTOM_DESKTOP_PUB_KEY }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import re, os, sys

          file_path = os.environ['LICENSE_CHECK_FILE']
          android_key = os.environ.get('CUSTOM_ANDROID_PUB_KEY', '').replace('\n', '').replace('\r', '').strip()
          desktop_key = os.environ.get('CUSTOM_DESKTOP_PUB_KEY', '').replace('\n', '').replace('\r', '').strip()

          if not android_key or not desktop_key:
              print("ERROR: CUSTOM_ANDROID_PUB_KEY and CUSTOM_DESKTOP_PUB_KEY secrets must be set.")
              sys.exit(1)

          with open(file_path, 'r') as f:
              content = f.read()

          def java_key_lines(key, var_name):
              chunks = [key[i:i+64] for i in range(0, len(key), 64)]
              lines = []
              continuation_indent = '\t\t\t'
              for idx, chunk in enumerate(chunks):
                  if idx == 0:
                      lines.append(f'"{chunk}"')
                  else:
                      lines.append(f'{continuation_indent}"{chunk}"')
              return ' + //\n'.join(lines)

          pattern_android = r'(private static final String ANDROID_PUB_KEY = )(".*?");'
          replacement_android = java_key_lines(android_key, 'ANDROID_PUB_KEY')
          content = re.sub(
              pattern_android,
              lambda m: f'{m.group(1)}{replacement_android};',
              content,
              flags=re.DOTALL
          )

          pattern_desktop = r'(private static final String DESKTOP_SUPPORTER_CERTIFICATE_PUB_KEY = )(".*?");'
          replacement_desktop = java_key_lines(desktop_key, 'DESKTOP_SUPPORTER_CERTIFICATE_PUB_KEY')
          content = re.sub(
              pattern_desktop,
              lambda m: f'{m.group(1)}{replacement_desktop};',
              content,
              flags=re.DOTALL
          )

          with open(file_path, 'w') as f:
              f.write(content)

          print(f"Successfully replaced public keys in {file_path}")
          PYTHON_SCRIPT

      - name: Set up JDK 17
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          chmod +x gradlew
          ./gradlew assemblePlaystoreRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC" \
            -Dorg.gradle.workers.max=2

      - name: Extract Version
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: version
        run: |
          VERSION=$(grep -oP "androidVersionName\s*=\s*'\K[^']+" build.gradle)
          VERSION=${VERSION%-SNAPSHOT}
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Sign and Rename APK
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          APP_VERSION: ${{ steps.version.outputs.name }}
        run: |
          mkdir -p release-apks

          # Strip any trailing whitespace/newlines from secrets
          KEYSTORE_BASE64=$(echo "$KEYSTORE_BASE64" | tr -d '\n\r ')
          KEYSTORE_PASSWORD=$(echo "$KEYSTORE_PASSWORD" | tr -d '\n\r')
          KEY_ALIAS=$(echo "$KEY_ALIAS" | tr -d '\n\r ')
          KEY_PASSWORD=$(echo "$KEY_PASSWORD" | tr -d '\n\r')

          APK_SOURCE="presentation/build/outputs/apk/playstore/release/presentation-playstore-release-unsigned.apk"
          OUTPUT_NAME="cryptomator-v${APP_VERSION}.apk"

          if [ ! -f "$APK_SOURCE" ]; then
            echo "ERROR: APK not found at $APK_SOURCE"
            exit 1
          fi

          ANDROID_BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -1)

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

            "$ANDROID_BUILD_TOOLS/zipalign" -p 4 "$APK_SOURCE" "${APK_SOURCE}.aligned"

            "$ANDROID_BUILD_TOOLS/apksigner" sign \
              --ks /tmp/release.keystore \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "release-apks/$OUTPUT_NAME" \
              "${APK_SOURCE}.aligned"

            "$ANDROID_BUILD_TOOLS/apksigner" verify "release-apks/$OUTPUT_NAME"
            rm -f "${APK_SOURCE}.aligned" /tmp/release.keystore
            echo "Signed: $OUTPUT_NAME"
          else
            cp "$APK_SOURCE" "release-apks/$OUTPUT_NAME"
            echo "WARNING: Signing secrets not configured. Releasing unsigned APK."
          fi

      - name: Create GitHub Release
        if: steps.sync_main.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/cryptomator-v${{ steps.version.outputs.name }}.apk
          tag_name: "v${{ steps.version.outputs.name }}-${{ github.run_number }}"
          target_commitish: "main"
          name: "Cryptomator Android v${{ steps.version.outputs.name }}"
          body: |
            Automated release synced from [cryptomator/android](https://github.com/cryptomator/android).

            **Version:** ${{ steps.version.outputs.name }}
            **Build:** ${{ github.run_number }}

            Download `cryptomator-v${{ steps.version.outputs.name }}.apk` and install on your Android device.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
